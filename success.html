<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6; /* Consistent with your form's background */
            color: #333;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .success-container {
            background: #fff;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .success-logo {
            max-width: 250px; /* Adjust as needed */
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        .lgpd-text {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .success-message {
            font-size: 2.2em; /* Larger font size */
            color: #005A8D; /* Primary color for consistency */
            font-weight: 700;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #00A8E8; /* Secondary color */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .back-link:hover {
            background-color: #007bb5;
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 2rem 1.5rem;
            }
            .success-logo {
                max-width: 200px;
            }
            .lgpd-text {
                font-size: 1em;
            }
            .success-message {
                font-size: 1.8em;
            }
        }

        @media (max-width: 480px) {
            .success-container {
                padding: 1.5rem 1rem;
            }
            .success-logo {
                max-width: 150px;
            }
            .lgpd-text {
                font-size: 0.9em;
            }
            .success-message {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <img src="logo2024.png" alt="Logo da Empresa" class="success-logo">
        <p class="lgpd-text">A Morada Urbana respeita a LGPD e protege os seus dados.</p>
        <h1 class="success-message">Formulário enviado e dados armazenados com sucesso!</h1>
        <a href="index.html" class="back-link">Voltar ao Formulário</a>
    </div>
</body>
</html>
