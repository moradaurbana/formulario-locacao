<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha Cadastral Dinâmica</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="form-container">
    <div class="header-logo">
        <img src="logo2024.png" alt="Logo da Empresa">
    </div>
    <h1>Ficha Cadastral para Locação</h1>

    <form id="form-cadastro">
        <section>
            <h2>Seleção Inicial</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="tipo-locacao" class="required">Tipo de Locação:</label>
                    <select id="tipo-locacao" name="tipo-locacao" required>
                        <option value="">Selecione...</option>
                        <option value="residencial">Residencial</option>
                        <option value="comercial">Comercial</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="tipo-pessoa" class="required">Tipo de Pessoa:</label>
                    <select id="tipo-pessoa" name="tipo-pessoa" required>
                        <option value="">Selecione...</option>
                        <option value="pf">Pessoa Física</option>
                        <option value="pj">Pessoa Jurídica</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="tipo-atividade" class="required">Tipo de Atividade:</label>
                    <select id="tipo-atividade" name="tipo-atividade" required>
                        <option value="">Selecione...</option>
                        <option value="clt">CLT</option>
                        <option value="liberal">Profissional Liberal</option>
                        <option value="empresario">Empresário</option>
                        <option value="aposentado">Aposentado/Pensionista</option>
                        <option value="estudante">Estudante</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="estado-civil" class="required">Estado Civil:</label>
                    <select id="estado-civil" name="estado-civil" required>
                        <option value="">Selecione...</option>
                        <option value="solteiro">Solteiro(a)</option>
                        <option value="casado">Casado(a)</option>
                        <option value="uniao-estavel">União Estável</option>
                        <option value="divorciado">Divorciado(a)</option>
                        <option value="separado">Separado(a)</option>
                        <option value="viuvo">Viúvo(a)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="garantia" class="required">Garantia:</label>
                    <select id="garantia" name="garantia" required>
                        <option value="">Selecione...</option>
                        <option value="fiador">Fiador</option>
                        <option value="seguro-fianca">Seguro Fiança</option>
                        <option value="capitalizacao">Título de Capitalização</option>
                        <option value="caucao">Caução</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="informacoes-pessoais-section" class="hidden">
            <h2>Informações Pessoais</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="nome-completo" class="required">Nome Completo:</label>
                    <input type="text" id="nome-completo" name="nome-completo" />
                </div>
                <div class="input-group">
                    <label for="cpf" class="required">CPF:</label>
                    <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" />
                    <span class="error-message" id="cpf-error"></span>
                </div>
                <div class="input-group">
                    <label for="rg" class="required">RG:</label>
                    <input type="text" id="rg" name="rg" maxlength="12" placeholder="00.000.000-0" />
                    <span class="error-message" id="rg-error"></span>
                </div>
                <div class="input-group">
                    <label for="data-nascimento" class="required">Data de Nascimento:</label>
                    <input type="date" id="data-nascimento" name="data-nascimento" />
                </div>
                <div class="input-group">
                    <label for="nacionalidade">Nacionalidade:</label>
                    <select id="nacionalidade" name="nacionalidade">
                        <option value="">Selecione...</option>
                        <option value="brasileira">Brasileira</option>
                        <option value="estrangeira">Estrangeira</option>
                        <option value="dupla">Dupla nacionalidade</option>
                        <option value="outra">Outra</option>
                    </select>
                </div>
                <div id="nacionalidade-brasileira-group" class="form-grid hidden">
                    <div class="input-group">
                        <label for="uf_nascimento">Estado de Nascimento (UF):</label>
                        <select id="uf_nascimento" name="uf_nascimento">
                            <option value="">Selecione...</option>
                            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option><option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option><option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option><option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option><option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option><option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option><option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option><option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option><option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="cidade_nascimento">Cidade de Nascimento:</label>
                        <input type="text" id="cidade_nascimento" name="cidade_nascimento" />
                    </div>
                </div>
                <div id="nacionalidade-estrangeira-group" class="form-grid hidden">
                    <div class="input-group">
                        <label for="pais_nascimento">País de Nascimento:</label>
                        <input type="text" id="pais_nascimento" name="pais_nascimento" />
                    </div>
                    <div class="input-group">
                        <label for="cidade_origem">Cidade no País de Origem (Opcional):</label>
                        <input type="text" id="cidade_origem" name="cidade_origem" />
                    </div>
                </div>
                <div id="nacionalidade-dupla-group" class="form-grid hidden">
                    <div class="input-group">
                        <label for="pais_principal">País Principal de Nascimento:</label>
                        <input type="text" id="pais_principal" name="pais_principal" />
                    </div>
                    <div class="input-group">
                        <label for="cidade_principal">Cidade Principal de Nascimento:</label>
                        <input type="text" id="cidade_principal" name="cidade_principal" />
                    </div>
                    <div class="input-group">
                        <label for="segundo_pais">Segundo País (Opcional):</label>
                        <input type="text" id="segundo_pais" name="segundo_pais" />
                    </div>
                    <div class="input-group">
                        <label for="segunda-cidade">Segunda Cidade (Opcional):</label>
                        <input type="text" id="segunda-cidade" name="segunda-cidade" />
                    </div>
                </div>
                <div id="nacionalidade-outra-group" class="form-grid hidden">
                    <div class="input-group">
                        <label for="naturalidade_texto_livre">Informe sua naturalidade:</label>
                        <input type="text" id="naturalidade_texto_livre" name="naturalidade_texto_livre" />
                    </div>
                </div>
                <div class="input-group">
                    <label for="celular" class="required">Celular (WhatsApp):</label>
                    <input type="tel" id="celular" name="celular" maxlength="15" placeholder="(99) 99999-9999" />
                    <span class="error-message" id="celular-error"></span>
                </div>
                <div class="input-group">

                    <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" />
                    <span class="error-message" id="email-error"></span>
                </div>
            </div>
        </section>

                    <input type="text" id="estado-residencial" name="estado-residencial" />

        <section id="dados-profissionais-section" class="hidden">

                    <div class="input-group">

                        <input type="text" id="fiador-segundo-pais" name="fiador-segundo-pais" />
                    </div>
                    <div class="input-group">
                        <label for="fiador-segunda-cidade">Segunda Cidade (Opcional):</label>
                        <input type="text" id="fiador-segunda-cidade" name="fiador-segunda-cidade" />
                    </div>
                </div>
                <div id="fiador-nacionalidade-outra-group" class="form-grid hidden">
                    <div class="input-group">
                        <label for="fiador-naturalidade_texto_livre">Informe sua naturalidade:</label>
                        <input type="text" id="fiador-naturalidade_texto_livre" name="fiador-naturalidade_texto_livre" />
                    </div>
                </div>
                <div class="input-group">
                    <label for="celular-fiador" class="required">Celular (WhatsApp):</label>
                    <input type="tel" id="celular-fiador" name="celular-fiador" maxlength="15" placeholder="(99) 99999-9999" />
                    <span class="error-message" id="celular-fiador-error"></span>
                </div>
                <div class="input-group">
                    <label for="email-fiador" class="required">Email:</label>
                    <input type="email" id="email-fiador" name="email-fiador" placeholder="seu.email@exemplo.com" />
                    <span class="error-message" id="email-fiador-error"></span>
                </div>
            </div>
        </section>

        <section id="endereco-fiador-section" class="hidden">
            <h2>Endereço Residencial do Fiador</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="cep-fiador-residencial" class="required">CEP:</label>
                    <input type="text" id="cep-fiador-residencial" name="cep-fiador-residencial" maxlength="9" placeholder="00000-000" />
                    <span class="error-message" id="cep-fiador-residencial-error"></span>
                </div>
                <div class="input-group">
                    <label for="logradouro-fiador-residencial" class="required">Logradouro:</label>
                    <input type="text" id="logradouro-fiador-residencial" name="logradouro-fiador-residencial" />
                </div>
                <div class="input-group">
                    <label for="numero-fiador-residencial" class="required">Número:</label>
                    <input type="text" id="numero-fiador-residencial" name="numero-fiador-residencial" />
                </div>
                <div class="input-group">
                    <label for="complemento-fiador-residencial">Complemento:</label>
                    <input type="text" id="complemento-fiador-residencial" name="complemento-fiador-residencial" />
                </div>
                <div class="input-group">
                    <label for="bairro-fiador-residencial" class="required">Bairro:</label>
                    <input type="text" id="bairro-fiador-residencial" name="bairro-fiador-residencial" />
                </div>
                <div class="input-group">
                    <label for="cidade-fiador-residencial" class="required">Cidade:</label>
                    <input type="text" id="cidade-fiador-residencial" name="cidade-fiador-residencial" />
                </div>
                <div class="input-group">
                    <label for="estado-fiador-residencial" class="required">Estado:</label>
                    <input type="text" id="estado-fiador-residencial" name="estado-fiador-residencial" />
                </div>
            </div>
        </section>

        <section id="dados-profissionais-fiador-section" class="hidden">
            <h2>Dados Profissionais do Fiador</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="nome-empresa-fiador" class="required">Nome da Empresa:</label>
                    <input type="text" id="nome-empresa-fiador" name="nome-empresa-fiador" />
                </div>
                <div class="input-group">
                    <label for="cargo-fiador" class="required">Cargo:</label>
                    <input type="text" id="cargo-fiador" name="cargo-fiador" />
                </div>
                <div class="input-group">
                    <label for="tempo-empresa-fiador" class="required">Tempo de Empresa:</label>
                    <input type="text" id="tempo-empresa-fiador" name="tempo-empresa-fiador" />
                </div>
                <div class="input-group">
                    <label for="remuneracao-mensal-fiador" class="required">Remuneração Mensal:</label>
                    <input type="text" id="remuneracao-mensal-fiador" name="remuneracao-mensal-fiador" />
                    <span class="error-message" id="remuneracao-mensal-fiador-error"></span>
                </div>
            </div>
        </section>
        <section id="documentos-section" class="hidden">
            <h2>Documentos Necessários</h2>
            <div id="documentos-container" class="form-grid-files">
                </div>
        </section>

        <div class="button-group">
            <button type="submit" id="submit-btn">Enviar</button>
        </div>
    </form>
</main>
<div id="loading-overlay" class="hidden">
    <div class="loader"></div>
</div>
<script src="script.js"></script>
</body>
</html>
